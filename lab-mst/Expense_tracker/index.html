<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Expense Tracker</h1>
    <label>Expense Name:</label>
    <input type="text" id="expenseName">
    <br>
    <br>
    <label>Amount:</label>
    <input type="number" id="amount">
    <br>
    <br>

    <label>Category:</label>
    <select id="category">
        <option value="select" disabled selected>Select Category</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
    </select>
    <br>
    <br>

    <button id="addBtn">Add Expense</button>
    <button id="updateBtn">Update Expense</button>
    <h3>Expense List</h3>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="expenseTable">
        </tbody>

    </table>

    <h3>Total Expense: ₹ <span id="total">0</span></h3>

    <script src="scripts.js"></script>

</body>

</html>
